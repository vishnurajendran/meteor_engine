name: Doxygen to GitHub Pages

# Runs only when commits are pushed to the documentation branch.
on:
  push:
    branches:
      - documentation

# The GITHUB_TOKEN needs these to create a Pages deployment.
# pages:write and id-token:write are required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancels in-progress runs on new pushes to avoid
# race conditions during deployment.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # 1. Check out the documentation branch
      - name: Checkout documentation branch
        uses: actions/checkout@v4
        with:
          ref: documentation

      # 2. Install Doxygen and Graphviz
      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      # 3. Fetch the doxygen-awesome theme (shallow clone, only need the CSS)
      - name: Clone doxygen-awesome-css
        run: git clone --depth 1 https://github.com/jothepro/doxygen-awesome-css.git

      # 4. Run Doxygen
      - name: Generate documentation
        run: doxygen Doxyfile

      # 5. Upload the generated HTML for Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

      # 6. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4